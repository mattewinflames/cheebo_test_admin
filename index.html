<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Cheebo Admin · demo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800;900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap');
:root{--blue:#2E2C8B;--ghost:#E3E2F4;--ink:#1B1B47;--muted:#8786A4;--surface:#F5F5FB;--line:#E8E8F2;--veg:#1E9E57;--amber:#E0820F;--green:#1E9E57;--redline:#C8441A;--bg:#FFFFFF;}
*{box-sizing:border-box}
body{margin:0;background:#dfe0ec;font-family:'Inter',system-ui,sans-serif;color:var(--ink);min-height:100vh;padding:22px 12px;display:flex;justify-content:center;align-items:flex-start}
.arch{font-family:'Archivo',system-ui,sans-serif}
.win{width:100%;max-width:1000px;background:var(--bg);border-radius:14px;overflow:hidden;box-shadow:0 22px 60px rgba(27,27,71,.25)}
.winbar{background:#ececf3;border-bottom:1px solid var(--line);padding:9px 14px;display:flex;align-items:center;gap:8px}
.dot{width:11px;height:11px;border-radius:50%}
.url{flex:1;text-align:center;font-size:12px;color:var(--muted);background:#fff;border:1px solid var(--line);border-radius:7px;padding:4px 10px;max-width:360px;margin:0 auto}
.demo-flag{background:#1B1B47;color:#fff;font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:3px 8px;border-radius:6px;font-weight:700}
.hdrwrap{position:sticky;top:0;background:var(--bg);z-index:6;border-bottom:1px solid var(--line)}
.hdr{padding:16px 20px 0}
.hdrtop{display:flex;justify-content:space-between;align-items:center}
.brand{display:flex;align-items:center;gap:11px}
.brand img{width:36px;height:36px}
.brand .w{font-family:'Archivo';font-weight:900;font-size:24px;color:var(--blue)}
.brand .w span{color:var(--muted);font-weight:700}
.btnsoft{background:var(--surface);color:var(--ink);border:1px solid var(--line);border-radius:9px;padding:8px 13px;font-weight:600;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.btnprimary{background:var(--blue);color:#fff;border:none;border-radius:9px;padding:9px 14px;font-weight:700;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.tabs{display:flex;gap:4px;margin-top:12px}
.tab{background:none;border:none;border-bottom:3px solid transparent;color:var(--muted);padding:9px 14px;font-size:14.5px;font-weight:700;cursor:pointer;margin-bottom:-1px;display:flex;align-items:center;gap:7px}
.tab.on{color:var(--blue);border-bottom-color:var(--blue)}
.body{padding:18px 20px 40px}
.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
.sel{background:var(--surface);border:1px solid var(--line);border-radius:9px;padding:9px 12px;font-size:14px;color:var(--ink)}
.stat{text-align:right}
.stat .n{font-family:'Archivo';font-weight:800;font-size:22px;color:var(--blue);line-height:1}
.stat .l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.cols{display:grid;grid-template-columns:330px 1fr;gap:18px;align-items:start}
@media(max-width:760px){.cols{grid-template-columns:1fr}}
.card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:15px}
.plate .wrow{padding:8px 0;border-bottom:1px solid var(--line)}
.plate .wrow:last-child{border-bottom:none}
.slots{display:flex;gap:3px;margin:6px 0}
.cell{flex:1;height:9px;border-radius:2px;background:#DEDEEC}
.cell.on{background:var(--blue)}
.tag{font-size:11px;background:var(--bg);border:1px solid var(--line);border-radius:20px;padding:2px 9px}
.filterchip{background:var(--surface);color:var(--ink);border:1px solid var(--line);border-radius:20px;padding:6px 13px;font-size:13px;font-weight:600;cursor:pointer}
.filterchip.on{background:var(--blue);color:#fff;border-color:var(--blue)}
.ocard{background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:14px}
.code{font-size:13px;font-weight:800;color:#fff;background:var(--ink);border-radius:7px;padding:2px 8px}
.badge{font-size:10.5px;font-weight:700;color:#fff;border-radius:20px;padding:2px 9px;text-transform:uppercase;letter-spacing:.5px}
.locobadge{font-size:10.5px;font-weight:600;color:var(--muted);border:1px solid var(--line);border-radius:20px;padding:2px 8px;display:inline-flex;align-items:center;gap:3px}
.bigt{font-family:'Archivo';font-weight:800;font-size:26px;color:var(--blue);line-height:1}
.money{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:13px 15px}
.money .l{font-size:10.5px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:4px}
.money .v{font-family:'Archivo';font-weight:800;line-height:1}
.tbl{border:1px solid var(--line);border-radius:12px;overflow:hidden}
.tblh{display:flex;padding:10px 14px;background:var(--surface);font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);font-weight:700}
.tblr{display:flex;align-items:center;padding:11px 14px;border-top:1px solid var(--line);font-size:14px}
.leaf{color:var(--veg)}
.switch{width:42px;height:24px;border-radius:20px;border:none;position:relative;cursor:pointer;flex-shrink:0}
.knob{position:absolute;top:2px;width:20px;height:20px;border-radius:50%;background:#fff}
.lbl2{font-size:10.5px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:5px}
.finp{width:100%;background:var(--surface);border:1px solid var(--line);border-radius:9px;color:var(--ink);padding:10px 12px;font-size:14px;font-family:inherit}
svg{stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
</style>
</head>

const euro=n=>(Number(n)||0).toFixed(2).replace('.',',')+'€';
const fmt=m=>{m=((m%1440)+1440)%1440;return String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0');};
const curDay=()=>DAYS.find(d=>d.key===app.dayKey);
const curSvc=()=>{const d=curDay();return d.services.find(s=>s.label===app.svcLabel)||d.services[0];};
const sk=()=>app.dayKey+'|'+app.svcLabel;
const NWIN=()=>{const s=curSvc();return s?Math.ceil((s.endMin-s.startMin)/WIN):0;};
const winStart=w=>curSvc().startMin+w*WIN, winEnd=w=>curSvc().startMin+(w+1)*WIN;
const ledger=()=>{const k=sk();if(!app.ledgers[k])app.ledgers[k]=new Array(NWIN()).fill(0);return app.ledgers[k];};
const curOrders=()=>app.orders.filter(o=>o.sk===sk());
const FORMATS=[{label:'singolo',patty:1,sur:0},{label:'doppio',patty:2,sur:2},{label:'triplo',patty:3,sur:4}];
const PANINI=[{n:'Classic',solo:6,menu:11.5},{n:'Oklahoma',solo:6.5,menu:12},{n:'Crispy',solo:7.5,menu:13},{n:'Smash veg',solo:9,menu:14.5},{n:'Chicken',solo:9,menu:14.5},{n:'Pulled Pork',solo:10,menu:15.5}];
const SIDES=[{n:'Patatine fritte',p:3.5},{n:'Tender di pollo',p:4.5},{n:'Nutellone',p:4},{n:'Birra artigianale',p:5},{n:'Soft drink',p:2.5}];

const MENUVIEW=[['Smashburgers',[['Classic',false],['Oklahoma',false],['Crispy',false],['Smash veg',true]]],['Burgers',[['Chicken',false],['Pulled Pork',false],['Burgerveg',true]]],['Sides',[['Tender di pollo',false],['Patatine fritte',false],['Polpette di trippa',false]]],['Drinks',[['Birra artigianale',false],['Soft drink',false],['Acqua',false]]]];

const STATUS={nuovo:{label:'Nuovo',color:'#2E2C8B',next:'in_consegna',action:'Segna in consegna'},in_consegna:{label:'In consegna',color:'#E0820F',next:'consegnato',action:'Segna consegnato'},consegnato:{label:'Consegnato',color:'#1E9E57',next:null,action:null}};

const app={tab:'ordini',orders:[],ledgers:{},code:0,filter:'dafare',dayKey:'gio',svcLabel:'Cena',variant:'arrows',pop:false};
const rnd=(a)=>a[Math.floor(Math.random()*a.length)];
const ri=(a,b)=>a+Math.floor(Math.random()*(b-a+1));

function selectDay(k){const d=DAYS.find(x=>x.key===k);if(!d.services.length)return;app.dayKey=k;
  if(d.services.length===1){app.svcLabel=d.services[0].label;app.pop=false;}
  else{app.svcLabel=d.services.some(s=>s.label===app.svcLabel)?app.svcLabel:d.services[0].label;}
  render();}
function selectSvc(l){app.svcLabel=l;app.pop=false;render();}
function flatSessions(){const list=[];DAYS.forEach(d=>d.services.forEach(s=>list.push({dayKey:d.key,svc:s.label})));return list;}
function stepSvc(dir){const list=flatSessions();let i=list.findIndex(x=>x.dayKey===app.dayKey&&x.svc===app.svcLabel);i=Math.max(0,Math.min(list.length-1,i+dir));app.dayKey=list[i].dayKey;app.svcLabel=list[i].svc;app.pop=false;render();}
function togglePop(){app.pop=!app.pop;render();}
function setVariant(v){app.variant=v;app.pop=false;render();}

function popPanel(){
  let h='<div style="position:absolute;top:calc(100% + 6px);left:0;z-index:30;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:0 14px 40px rgba(27,27,71,.18);padding:12px;width:min(340px,86vw)">';
  h+='<div style="font-size:10.5px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:8px">Giorno</div>';
  h+='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:12px">';
  DAYS.forEach(d=>{const on=d.key===app.dayKey;const closed=!d.services.length;
    h+='<button onclick="selectDay(\''+d.key+'\')" '+(closed?'disabled':'')+' style="text-align:center;border-radius:9px;padding:7px 2px;cursor:'+(closed?'default':'pointer')+';border:1px solid '+(on?'var(--blue)':'var(--line)')+';background:'+(on?'var(--blue)':closed?'#f3f3f8':'#fff')+';color:'+(on?'#fff':closed?'#c2c2d4':'var(--ink)')+'"><div style="font-size:10px;text-transform:uppercase;opacity:.75">'+d.dayLabel.slice(0,3)+'</div><div style="font-weight:700;font-size:14px">'+d.dateLabel.replace(/\D/g,'')+'</div></button>';});
  h+='</div>';
  const svcs=curDay().services;
  h+='<div style="font-size:10.5px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:8px">Servizio</div><div style="display:flex;gap:6px">';
  svcs.forEach(s=>{const on=s.label===app.svcLabel;h+='<button onclick="selectSvc(\''+s.label+'\')" style="flex:1;border:1px solid '+(on?'var(--blue)':'var(--line)')+';background:'+(on?'var(--blue)':'#fff')+';color:'+(on?'#fff':'var(--ink)')+';border-radius:8px;padding:9px 10px;font-size:13px;font-weight:600;cursor:pointer"><div>'+s.label+'</div><div style="font-size:10.5px;opacity:.7;font-weight:400">'+fmt(s.startMin)+'–'+fmt(s.endMin)+'</div></button>';});
  h+='</div></div>';
  return h;
}
function label(){const d=curDay();return d.dayLabel+' · '+d.dateLabel.replace(/^\D+\s?/,'')+' — '+app.svcLabel;}

function selectorArrows(){
  const list=flatSessions();const i=list.findIndex(x=>x.dayKey===app.dayKey&&x.svc===app.svcLabel);
  let h='<div style="position:relative;display:inline-flex;align-items:center;gap:6px;margin-bottom:16px">';
  h+='<button onclick="stepSvc(-1)" '+(i<=0?'disabled':'')+' style="width:38px;height:38px;border-radius:9px;border:1px solid var(--line);background:#fff;cursor:'+(i<=0?'default':'pointer')+';color:'+(i<=0?'#c8c8d8':'var(--ink)')+';display:inline-flex;align-items:center;justify-content:center">'+ic('cleft',18)+'</button>';

function selectorPicker(){

  h+='<button onclick="togglePop()" style="display:flex;align-items:center;gap:10px;border:1px solid '+(app.pop?'var(--blue)':'var(--line)')+';background:#fff;border-radius:10px;padding:10px 15px;cursor:pointer;font-weight:700;font-size:14px;color:var(--ink)">'+ic('cal',16)+'<span>'+label()+'</span>'+ic('chevdown',15)+'</button>';
  if(app.pop)h+=popPanel();
  h+='</div>';return h;
}
function daySelector(){
  return selectorPicker();
}

function planFirst(p){const L=ledger();let rem=p,cells=[],last=0;for(let w=0;w<L.length&&rem>0;w++){const free=CAP-L[w];const take=Math.min(free,rem);for(let i=0;i<take;i++)cells.push(w);if(take>0)last=w;rem-=take;}if(rem>0)return null;return{cells,windowIndex:last,readyMin:winEnd(last)};}

function simula(){
  const nItems=ri(1,2);const items=[];let patties=0,total=0;
  for(let i=0;i<nItems;i++){const b=rnd(PANINI);const f=rnd(FORMATS);const menu=Math.random()<.5;const ex=Math.random()<.4?rnd(EXTRA):null;
    let price=(menu?b.menu:b.solo)+f.sur+(ex?ex.p:0);let label=b.n+' '+f.label+(menu?' · menu':'')+(ex?' + '+ex.n:'');
    items.push(label);patties+=f.patty;total+=price;}
  if(Math.random()<.6){const s=rnd(SIDES);items.push(s.n);total+=s.p;}
  const L=ledger();const plan=planFirst(patties);
  if(!plan){alert('Servizio al completo: la piastra non ha più spazio. Usa "Pulisci" per ripartire.');return;}
  plan.cells.forEach(w=>L[w]++);
  const pay=Math.random()<.6?'loco':'online';
  const name=rnd(NAMES);
  const phone=pay==='loco'?'3'+ri(20,49)+' '+ri(1000000,9999999):(Math.random()<.3?'3'+ri(20,49)+' '+ri(1000000,9999999):'');
  app.code++;
  app.orders.push({id:'o'+Date.now()+Math.random(),sk:sk(),code:app.code,name,phone,items,patties,total:+total.toFixed(2),pay,windowIndex:plan.windowIndex,readyMin:plan.readyMin,mode:Math.random()<.3?'at':'first',status:'nuovo'});
  render();
}
function pulisci(){if(!curOrders().length)return;if(!confirm('Demo: cancellare gli ordini di questo servizio e azzerare la piastra?'))return;app.orders=app.orders.filter(o=>o.sk!==sk());app.ledgers[sk()]=new Array(NWIN()).fill(0);render();}
function advance(id){const o=app.orders.find(x=>x.id===id);const nx=STATUS[o.status].next;if(nx)o.status=nx;render();}

function ic(name,s){s=s||16;const S='width="'+s+'" height="'+s+'" viewBox="0 0 24 24"';
 const P={
  clipboard:'<svg '+S+'><rect x="8" y="2" width="8" height="4" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/></svg>',
  wallet:'<svg '+S+'><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></svg>',
  utensils:'<svg '+S+'><path d="M3 2v7a2 2 0 0 0 2 2 2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M19 15V2a4 3 0 0 0-3 4v6a2 2 0 0 0 2 2h1Zm0 0v7"/></svg>',
  flame:'<svg '+S+'><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.4-.5-2-1-3-1-2-.2-4 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.2.4-2.3 1-3a2.5 2.5 0 0 0 2.5 2.5Z"/></svg>',
  printer:'<svg '+S+'><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>',
  check:'<svg '+S+'><polyline points="20 6 9 17 4 12"/></svg>',
  chevron:'<svg '+S+'><polyline points="9 18 15 12 9 6"/></svg>',
  store:'<svg '+S+'><path d="M2 7l1.5-4h17L22 7"/><path d="M4 7v13h16V7"/><path d="M2 7h20"/></svg>',
  plus:'<svg '+S+'><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>',
  rotate:'<svg '+S+'><polyline points="1 4 1 10 7 10"/><path d="M3.5 15a9 9 0 1 0 2.1-9.4L1 10"/></svg>',
  pencil:'<svg '+S+'><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>',
  x:'<svg '+S+'><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>',
  trash:'<svg '+S+'><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>',
  cleft:'<svg '+S+'><polyline points="15 18 9 12 15 6"/></svg>',
  cright:'<svg '+S+'><polyline points="9 18 15 12 9 6"/></svg>',
  chevdown:'<svg '+S+'><polyline points="6 9 12 15 18 9"/></svg>',
  cal:'<svg '+S+'><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>'
 };return P[name]||'';
}

function tabsHtml(){
  const t=[['ordini','Ordini','clipboard'],['incassi','Incassi','wallet'],['menu','Menu','utensils']];
  return t.map(([k,l,i])=>'<button class="tab '+(app.tab===k?'on':'')+'" onclick="app.tab=\''+k+'\';render()">'+ic(i,16)+l+'</button>').join('');
}

function ordini(){
  const orders=curOrders(),tot=orders.reduce((s,o)=>s+o.patties,0);
  const counts={};orders.forEach(o=>counts[o.status]=(counts[o.status]||0)+1);
  const L=ledger();const lastUsed=L.reduce((a,v,i)=>v>0?i:a,-1);const shown=Math.min(NWIN(),Math.max(lastUsed+2,5));
  let h=daySelector();
  h+='<div class="toolbar">';
  h+='<button class="btnprimary" onclick="simula()">'+ic('plus',15)+'Simula ordine</button>';
  h+='<button class="btnsoft" onclick="pulisci()" style="color:var(--redline);border-color:#F3C9BC;background:#FFF4F0">'+ic('rotate',14)+'Pulisci</button>';
  h+='<div style="flex:1"></div><div class="stat"><div class="n">'+orders.length+'</div><div class="l">ordini</div></div><div class="stat"><div class="n">'+tot+'</div><div class="l">patty</div></div></div>';
  h+='<div class="cols"><div class="card plate"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><span class="arch" style="font-weight:800;font-size:18px">Occupazione piastra</span><span style="font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px">'+ic('flame',13)+CAP+'/10 min</span></div>';
  for(let w=0;w<shown;w++){const used=L[w]||0;const here=orders.filter(o=>o.windowIndex===w);const empty=used===0;
    h+='<div class="wrow"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><span style="font-size:12.5px">'+fmt(winStart(w))+'–'+fmt(winEnd(w))+'</span><span style="font-size:11.5px;font-weight:'+(used?700:400)+';color:'+(used===CAP?'var(--redline)':empty?'#b9b9cc':'var(--muted)')+'">'+(empty?'libera':used+'/'+CAP+(used===CAP?' · piena':''))+'</span></div><div class="slots">';
    for(let s=0;s<CAP;s++)h+='<div class="cell '+(s<used?'on':'')+'"></div>';
    h+='</div>';
    if(here.length)h+='<div style="display:flex;flex-wrap:wrap;gap:5px">'+here.map(o=>'<span class="tag">#'+o.code+' '+o.name+' · '+o.patties+'p</span>').join('')+'</div>';
    h+='</div>';}
  h+='</div><div>';
  h+='<div style="display:flex;gap:7px;margin-bottom:14px;flex-wrap:wrap">';
  const daFare=(counts.nuovo||0)+(counts.in_consegna||0);
  [['dafare','Da fare',daFare],['consegnato','Consegnato',counts.consegnato||0],['tutti','Tutti',orders.length]].forEach(([k,l,c])=>{h+='<button class="filterchip '+(app.filter===k?'on':'')+'" onclick="app.filter=\''+k+'\';render()">'+l+' <span style="opacity:.7">'+c+'</span></button>';});
  h+='</div><div style="display:flex;flex-direction:column;gap:10px">';
  const match=o=>app.filter==='tutti'||(app.filter==='dafare'?(o.status==='nuovo'||o.status==='in_consegna'):o.status===app.filter);
  const vis=orders.filter(match).sort((a,b)=>a.readyMin-b.readyMin);
  if(!vis.length){const msg=orders.length===0?'Nessun ordine per questo servizio. Premi <b>Simula ordine</b> per generarne.':(app.filter==='dafare'?'Tutto lavorato! 🎉<br>Gli ordini consegnati sono nelle schede accanto.':'Nessun ordine in questa scheda.');h+='<div style="color:var(--muted);font-size:14px;padding:18px 0;line-height:1.5">'+msg+'</div>';}
  vis.forEach(o=>{const st=STATUS[o.status];const dim=o.status==='consegnato';
    h+='<div class="ocard" style="opacity:'+(dim?.6:1)+'"><div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px"><div style="min-width:0"><div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap"><span class="code">#'+o.code+'</span><span style="font-weight:700;font-size:16px">'+o.name+'</span><span class="badge" style="background:'+st.color+'">'+st.label+'</span>'+(o.pay==='online'?'<span class="badge" style="background:var(--green)">'+ic('check',10)+' Pagato</span>':'<span class="locobadge">'+ic('store',11)+' In loco</span>')+'</div>';
    h+='<div style="font-size:11.5px;color:var(--muted);margin-top:4px">'+app.svcLabel+' · '+(o.mode==='at'?'orario scelto':'primo disponibile')+(o.phone?' · <a href="tel:'+o.phone.replace(/\s/g,'')+'" style="color:var(--blue);text-decoration:none;font-weight:600">'+o.phone+'</a>':'')+'</div>';
    h+='<div style="font-size:13px;margin-top:6px;line-height:1.5">'+o.items.map(i=>'<div>'+i+'</div>').join('')+'</div>';
    h+='<div style="font-size:12px;color:var(--muted);margin-top:6px">'+o.patties+' patty · <span style="color:var(--blue);font-weight:700">'+euro(o.total)+'</span></div></div>';
    h+='<div style="text-align:right;flex-shrink:0"><div style="font-size:10.5px;letter-spacing:1px;text-transform:uppercase;color:var(--muted)">Pronto</div><div class="bigt">'+fmt(o.readyMin)+'</div></div></div>';
    h+='<div style="display:flex;gap:8px;margin-top:12px"><button class="btnsoft" onclick="alert(\'Demo: stampa comanda #'+o.code+'\')">'+ic('printer',15)+' Stampa comanda</button>';
    if(st.next)h+='<button class="btnprimary" style="flex:1" onclick="advance(\''+o.id+'\')">'+(o.status==='in_consegna'?ic('check',15):ic('chevron',15))+' '+st.action+'</button>';
    h+='</div></div>';});
  h+='</div></div>';
  return h;
}

function incassi(){
  const o=curOrders();const tot=o.reduce((s,x)=>s+x.total,0);const online=o.filter(x=>x.pay==='online').reduce((s,x)=>s+x.total,0);const loco=tot-online;
  const rows=[...o].sort((a,b)=>a.readyMin-b.readyMin);
  let h=daySelector();
  h+='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px">';
  h+='<div class="money"><div class="l">Incasso totale</div><div class="v" style="font-size:28px;color:var(--blue)">'+euro(tot)+'</div></div>';
  h+='<div class="money"><div class="l">Pagato online</div><div class="v" style="font-size:22px;color:var(--green)">'+euro(online)+'</div></div>';
  h+='<div class="money"><div class="l">Da incassare in loco</div><div class="v" style="font-size:22px;color:var(--amber)">'+euro(loco)+'</div></div></div>';
  if(!rows.length){h+='<div style="color:var(--muted);font-size:14px;padding:18px 0">Nessun incasso. Vai su <b>Ordini</b> e premi <b>Simula ordine</b>.</div>';return h;}
  h+='<div class="tbl"><div class="tblh"><span style="flex:1">Cliente</span><span style="width:70px;text-align:center">Pronto</span><span style="width:120px;text-align:center">Pagamento</span><span style="width:90px;text-align:right">Importo</span></div>';
  rows.forEach(o=>{h+='<div class="tblr"><span style="flex:1;font-weight:600"><span style="color:var(--muted);font-weight:700">#'+o.code+'</span> '+o.name+'</span><span style="width:70px;text-align:center;color:var(--muted)">'+fmt(o.readyMin)+'</span><span style="width:120px;text-align:center">'+(o.pay==='online'?'<span class="badge" style="background:var(--green)">'+ic('check',10)+' Online</span>':'<span class="locobadge">'+ic('store',11)+' In loco</span>')+'</span><span style="width:90px;text-align:right;font-weight:700;color:var(--blue)">'+euro(o.total)+'</span></div>';});
  h+='<div class="tblr" style="border-top:2px solid var(--line);background:var(--surface)"><span style="flex:1;font-weight:700">Totale · '+rows.length+' '+(rows.length===1?'ordine':'ordini')+'</span><span style="width:90px;text-align:right" class="arch"><b style="color:var(--blue)">'+euro(tot)+'</b></span></div>';
  h+='</div><div style="margin-top:14px;font-size:12px;color:var(--muted);line-height:1.5">"Online" = già pagato (Nexi). "In loco" = da saldare al banco.</div>';
  return h;
}

const MENUDATA=[
 {cat:'Smashburgers',type:'panino',items:[{id:'m1',name:'Classic',desc:'American cheese, cipolla, salsa Cheebo',solo:6,menu:11.5,veg:false,active:true},{id:'m2',name:'Oklahoma',desc:'Cipolla smashata, ketchup, senape',solo:6.5,menu:12,veg:false,active:true},{id:'m3',name:'Smash veg',desc:'Patty plant based, veg cheddar',solo:9,menu:14.5,veg:true,active:true}]},
 {cat:'Burgers',type:'panino',items:[{id:'m4',name:'Chicken',desc:'Pollo fritto, pickles, coleslaw',solo:9,menu:14.5,veg:false,active:true},{id:'m5',name:'Pulled Pork',desc:'Maiale sfilacciato, salsa BBQ',solo:10,menu:15.5,veg:false,active:false}]},
 {cat:'Sides',type:'semplice',items:[{id:'m6',name:'Patatine fritte',price:3.5,active:true},{id:'m7',name:'Tender di pollo',price:4.5,active:true}]},
 {cat:'Drinks',type:'semplice',items:[{id:'m8',name:'Birra artigianale',price:5,active:true},{id:'m9',name:'Acqua',price:1.5,active:true}]},
];
let menuSeq=100;
const menuState={editing:null,toast:''};

function mToggle(catI,itI){MENUDATA[catI].items[itI].active=!MENUDATA[catI].items[itI].active;render();}
function mEdit(id){menuState.editing=id;render();}
function mCancel(){menuState.editing=null;render();}
function mAddNew(catI){const t=MENUDATA[catI].type;const id='new'+(++menuSeq);const base=t==='panino'?{id,name:'',desc:'',solo:0,menu:0,veg:false,active:true,_new:true}:{id,name:'',price:0,active:true,_new:true};MENUDATA[catI].items.push(base);menuState.editing=id;render();}
function mField(catI,itI,f,v){MENUDATA[catI].items[itI][f]=v;}
function mDelete(catI,itI){MENUDATA[catI].items.splice(itI,1);menuState.editing=null;render();}
function mSave(catI,itI){const it=MENUDATA[catI].items[itI];
  const name=document.getElementById('f_name').value.trim();
  if(!name){alert('Inserisci un nome.');return;}
  it.name=name;delete it._new;
  if(MENUDATA[catI].type==='panino'){it.desc=document.getElementById('f_desc').value;it.solo=+document.getElementById('f_solo').value||0;it.menu=+document.getElementById('f_menu').value||0;}
  else{it.price=+document.getElementById('f_price').value||0;}
  menuState.editing=null;menuState.toast='Modifiche salvate ✓';render();
  setTimeout(()=>{menuState.toast='';render();},2200);
}

function menu(){
  const activeCount=MENUDATA.reduce((s,c)=>s+c.items.filter(i=>i.active).length,0);
  let h='<div style="max-width:660px;margin:0 auto">';
  if(menuState.toast)h+='<div style="position:sticky;top:0;z-index:5;background:var(--green);color:#fff;border-radius:10px;padding:10px 14px;font-size:13.5px;font-weight:600;margin-bottom:12px;text-align:center">'+menuState.toast+'</div>';
  h+='<div style="display:flex;justify-content:space-between;align-items:center"><div style="font-size:12px;color:var(--muted)">Le modifiche compaiono sul sito cliente in tempo reale</div><div><span class="arch" style="font-weight:800;font-size:22px;color:var(--blue)">'+activeCount+'</span> <span style="font-size:11px;color:var(--muted);text-transform:uppercase">attivi</span></div></div>';
  MENUDATA.forEach((cat,catI)=>{
    h+='<div class="arch" style="font-weight:900;font-size:30px;color:var(--ghost);letter-spacing:-1px;margin-top:22px;margin-bottom:4px">'+cat.cat+'</div>';
    cat.items.forEach((it,itI)=>{
      if(menuState.editing===it.id){h+=editForm(cat,catI,itI);return;}
      const off=!it.active;
      h+='<div style="display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--line);opacity:'+(off?.55:1)+'">';
      h+='<div style="flex:1;min-width:0"><div style="display:flex;align-items:center;gap:8px"><span style="font-weight:700;font-size:15px">'+(it.name||'—')+'</span>'+(it.veg?'<span class="leaf">●</span>':'')+(off?'<span style="font-size:10px;font-weight:700;color:var(--muted);background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:1px 8px">NON IN VENDITA</span>':'')+'</div>';
      if(cat.type==='panino')h+='<div style="font-size:12px;color:var(--muted);margin-top:2px">'+it.desc+'</div>';
      h+='<div style="font-size:12.5px;color:var(--blue);font-weight:600;margin-top:3px">'+(cat.type==='panino'?'solo '+euro(it.solo)+' · menu '+euro(it.menu):euro(it.price))+'</div></div>';
      h+='<button class="switch" style="background:'+(it.active?'var(--blue)':'#CFCFE0')+'" onclick="mToggle('+catI+','+itI+')"><span class="knob" style="left:'+(it.active?'20px':'2px')+'"></span></button>';
      h+='<button class="btnsoft" style="width:34px;height:34px;padding:0;justify-content:center" onclick="mEdit(\''+it.id+'\')">'+ic('pencil',15)+'</button></div>';
    });
    h+='<button onclick="mAddNew('+catI+')" style="display:flex;align-items:center;gap:8px;background:var(--surface);color:var(--blue);border:1px dashed var(--blue);border-radius:10px;padding:11px 16px;font-size:14px;font-weight:600;cursor:pointer;width:100%;margin-top:10px">'+ic('plus',15)+' Aggiungi in '+cat.cat+'</button>';
  });
  h+='<div style="margin-top:26px;padding:13px 15px;background:var(--surface);border:1px solid var(--line);border-radius:12px;font-size:12.5px;color:var(--muted);line-height:1.5"><b style="color:var(--ink)">Struttura standard automatica:</b> ogni panino è in formati Singolo · Doppio (+2€) · Triplo (+4€), con Solo panino / Menu e gli Extra.</div>';
  h+='</div>';return h;
}
function editForm(cat,catI,itI){
  const it=cat.items[itI];const panino=cat.type==='panino';
  let h='<div style="border:1px solid var(--blue);border-radius:12px;padding:16px;margin-top:12px">';
  if(it._new)h+='<div style="font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--blue);font-weight:700;margin-bottom:10px">Nuova voce in '+cat.cat+'</div>';
  h+='<div style="margin-bottom:12px"><div class="lbl2">Nome</div><input id="f_name" class="finp" value="'+(it.name||'').replace(/"/g,'&quot;')+'" placeholder="Es. Double Bacon"/></div>';
  if(panino){
    h+='<div style="margin-bottom:12px"><div class="lbl2">Descrizione</div><textarea id="f_desc" class="finp" rows="2" style="resize:vertical">'+(it.desc||'')+'</textarea></div>';
    h+='<div style="display:flex;gap:12px"><div style="flex:1;margin-bottom:12px"><div class="lbl2">Prezzo solo (€)</div><input id="f_solo" class="finp" inputmode="decimal" value="'+it.solo+'"/></div><div style="flex:1;margin-bottom:12px"><div class="lbl2">Prezzo menu (€)</div><input id="f_menu" class="finp" inputmode="decimal" value="'+it.menu+'"/></div></div>';
  }else{
    h+='<div style="margin-bottom:12px"><div class="lbl2">Prezzo (€)</div><input id="f_price" class="finp" inputmode="decimal" value="'+it.price+'"/></div>';
  }
  h+='<div style="display:flex;gap:8px;margin-top:8px"><button class="btnprimary" onclick="mSave('+catI+','+itI+')">'+ic('check',15)+' Salva</button><button class="btnsoft" onclick="mCancel()">'+ic('x',15)+' Annulla</button><button onclick="mDelete('+catI+','+itI+')" style="margin-left:auto;background:none;color:var(--redline);border:1px solid var(--line);border-radius:9px;padding:9px 14px;font-weight:600;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:6px">'+ic('trash',15)+' Elimina</button></div>';
  h+='</div>';return h;
}

function render(){
  document.getElementById('tabs').innerHTML=tabsHtml();
  document.getElementById('body').innerHTML=app.tab==='ordini'?ordini():app.tab==='incassi'?incassi():menu();
}
render();
</script>
</body>
</html>
